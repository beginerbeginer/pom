services:
  vrt:
    build:
      context: .
      dockerfile: vrt/Dockerfile
    image: pom-vrt:latest
    volumes:
      # 結果をホストに出力するため output ディレクトリをマウント
      - ./vrt/output:/app/vrt/output
    command: npm run vrt

  vrt-update:
    build:
      context: .
      dockerfile: vrt/Dockerfile
    image: pom-vrt:latest
    volumes:
      # expected.png を更新するため vrt ディレクトリ全体をマウント
      - ./vrt:/app/vrt
    command: npm run vrt:update

  preview:
    build:
      context: .
      dockerfile: vrt/Dockerfile
    image: pom-vrt:latest
    volumes:
      # preview 結果をホストに出力するためマウント
      - ./preview/output:/app/preview/output
    command: npm run preview

  docs-images:
    build:
      context: .
      dockerfile: vrt/Dockerfile
    image: pom-vrt:latest
    volumes:
      # ドキュメント用画像をホストに出力するためマウント
      - ./docs/images:/app/docs/images
    command: npm run docs:images

  docs-images-vrt:
    build:
      context: .
      dockerfile: vrt/Dockerfile
    image: pom-vrt:latest
    volumes:
      # ベースラインを常にホスト側から参照
      - ./docs/images/expected:/app/docs/images/expected:ro
      # VRT結果をホストに出力するため output ディレクトリをマウント
      - ./docs/images/output:/app/docs/images/output
    command: npm run docs:images:vrt

  docs-images-vrt-update:
    build:
      context: .
      dockerfile: vrt/Dockerfile
    image: pom-vrt:latest
    volumes:
      # ベースラインを更新するため expected と output をマウント
      - ./docs/images/expected:/app/docs/images/expected
      - ./docs/images/output:/app/docs/images/output
    command: npm run docs:images:vrt:update
