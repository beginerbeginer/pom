name: CI - pom-md

on:
  push:
    branches: ["main"]
    paths:
      - "packages/pom-md/**"
      - "packages/pom/src/**"
      - "package.json"
      - "packages/pom/package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/ci-pom-md.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "packages/pom-md/**"
      - "packages/pom/src/**"
      - "package.json"
      - "packages/pom/package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/ci-pom-md.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: packages/pom-md
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: packages/pom-md/.node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile
        working-directory: .
      - run: pnpm run fmt:check
      - run: pnpm run lint
      - run: pnpm run typecheck
      - run: pnpm run test:run
      - run: pnpm run build
