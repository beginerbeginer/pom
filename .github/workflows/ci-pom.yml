name: CI - pom

on:
  push:
    branches: ["main"]
    paths:
      - "packages/pom/src/**"
      - "packages/pom/scripts/**"
      - "packages/pom/vrt/**"
      - "packages/pom/preview/**"
      - "package.json"
      - "packages/pom/package.json"
      - "pnpm-lock.yaml"
      - "packages/pom/tsconfig.json"
      - "packages/pom/tsconfig.check.json"
      - "packages/pom/main.ts"
      - "packages/pom/eslint.config.mts"
      - "packages/pom/knip.json"
      - "packages/pom/vitest.config.ts"
      - ".node-version"
      - ".github/workflows/ci-pom.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "packages/pom/src/**"
      - "packages/pom/scripts/**"
      - "packages/pom/vrt/**"
      - "packages/pom/preview/**"
      - "package.json"
      - "packages/pom/package.json"
      - "pnpm-lock.yaml"
      - "packages/pom/tsconfig.json"
      - "packages/pom/tsconfig.check.json"
      - "packages/pom/main.ts"
      - "packages/pom/eslint.config.mts"
      - "packages/pom/knip.json"
      - "packages/pom/vitest.config.ts"
      - ".node-version"
      - ".github/workflows/ci-pom.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run fmt:check
        working-directory: packages/pom
      - run: pnpm run lint
        working-directory: packages/pom
      - run: pnpm run knip
        working-directory: packages/pom
      - run: pnpm run typecheck
        working-directory: packages/pom
      - run: pnpm run test:coverage
        working-directory: packages/pom

      - name: Cache main branch coverage
        if: github.event_name == 'push'
        uses: actions/cache/save@v4
        with:
          path: packages/pom/coverage/coverage-summary.json
          key: coverage-main-${{ github.sha }}

      - name: Backup PR coverage
        if: github.event_name == 'pull_request'
        run: cp packages/pom/coverage/coverage-summary.json /tmp/pr-coverage-summary.json

      - name: Restore main branch coverage
        id: restore-main-coverage
        if: github.event_name == 'pull_request'
        uses: actions/cache/restore@v4
        with:
          path: packages/pom/coverage/coverage-summary.json
          key: coverage-main-
          restore-keys: coverage-main-

      - name: Prepare coverage for comparison
        if: github.event_name == 'pull_request' && steps.restore-main-coverage.outputs.cache-matched-key != ''
        run: |
          mkdir -p __main_coverage
          mv packages/pom/coverage/coverage-summary.json __main_coverage/
          cp /tmp/pr-coverage-summary.json packages/pom/coverage/coverage-summary.json

      - name: Coverage summary comment (with comparison)
        if: github.event_name == 'pull_request' && steps.restore-main-coverage.outputs.cache-matched-key != ''
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          name: pom
          json-summary-path: packages/pom/coverage/coverage-summary.json
          json-summary-compare-path: __main_coverage/coverage-summary.json

      - name: Coverage summary comment (without comparison)
        if: github.event_name == 'pull_request' && steps.restore-main-coverage.outputs.cache-matched-key == ''
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          name: pom
          json-summary-path: packages/pom/coverage/coverage-summary.json

      - run: pnpm exec tsx main.ts
        working-directory: packages/pom
