name: CI - Docs Site

on:
  push:
    branches: ["main"]
    paths:
      - "website/**"
      - "docs/**"
      - "website/.node-version"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/ci-docs-site.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "website/**"
      - "docs/**"
      - "website/.node-version"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/ci-docs-site.yml"

jobs:
  docs-site:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: website/.node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter pom-docs run fmt:check
      - run: pnpm --filter pom-docs run lint
      - run: pnpm --filter pom-docs run typecheck
      - run: pnpm --filter pom-docs run test:run
      - run: pnpm --filter pom-docs run build
