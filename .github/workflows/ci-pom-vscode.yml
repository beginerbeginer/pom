name: CI - pom-vscode

on:
  push:
    branches: ["main"]
    paths:
      - "packages/pom-vscode/**"
      - "packages/pom-md/**"
      - "packages/pom/src/**"
      - "package.json"
      - "packages/pom/package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "packages/pom/tsconfig.json"
      - ".node-version"
      - ".github/workflows/ci-pom-vscode.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "packages/pom-vscode/**"
      - "packages/pom-md/**"
      - "packages/pom/src/**"
      - "package.json"
      - "packages/pom/package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "packages/pom/tsconfig.json"
      - ".node-version"
      - ".github/workflows/ci-pom-vscode.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build pom
        run: pnpm --filter @hirokisakabe/pom run build
      - name: Build pom-md
        run: pnpm --filter @hirokisakabe/pom-md run build
      - name: Format check
        working-directory: packages/pom-vscode
        run: pnpm run fmt:check
      - name: Lint
        working-directory: packages/pom-vscode
        run: pnpm run lint
      - name: Type check
        working-directory: packages/pom-vscode
        run: pnpm run typecheck
      - name: Test
        working-directory: packages/pom-vscode
        run: pnpm run test:run
      - name: Build
        working-directory: packages/pom-vscode
        run: pnpm run build
      - name: Integration Test
        working-directory: packages/pom-vscode
        run: xvfb-run -a pnpm run test:integration
      - name: VSIX E2E Test
        continue-on-error: true # TODO: #508 修正後に除去
        working-directory: packages/pom-vscode
        run: xvfb-run -a pnpm run test:vsix
      - name: Clean VSIX artifacts
        if: always()
        working-directory: packages/pom-vscode
        run: pnpm run test:vsix:clean
