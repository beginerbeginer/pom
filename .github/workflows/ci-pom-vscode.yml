name: CI - pom-vscode

on:
  push:
    branches: ["main"]
    paths:
      - "packages/pom-vscode/**"
      - "packages/pom-md/**"
      - "packages/pom/src/**"
      - "package.json"
      - "packages/pom/package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "packages/pom/tsconfig.json"
      - ".node-version"
      - ".github/workflows/ci-pom-vscode.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "packages/pom-vscode/**"
      - "packages/pom-md/**"
      - "packages/pom/src/**"
      - "package.json"
      - "packages/pom/package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "packages/pom/tsconfig.json"
      - ".node-version"
      - ".github/workflows/ci-pom-vscode.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build pom
        run: pnpm --filter @hirokisakabe/pom run build
      - name: Build pom-md
        run: pnpm --filter @hirokisakabe/pom-md run build
      - name: Format check
        working-directory: packages/pom-vscode
        run: pnpm run fmt:check
      - name: Lint
        working-directory: packages/pom-vscode
        run: pnpm run lint
      - name: Knip
        working-directory: packages/pom-vscode
        run: pnpm run knip
      - name: Type check
        working-directory: packages/pom-vscode
        run: pnpm run typecheck
      - name: Test with coverage
        working-directory: packages/pom-vscode
        run: pnpm run test:coverage

      - name: Cache main branch coverage
        if: github.event_name == 'push'
        uses: actions/cache/save@v4
        with:
          path: packages/pom-vscode/coverage/coverage-summary.json
          key: coverage-pom-vscode-main-${{ github.sha }}

      - name: Backup PR coverage
        if: github.event_name == 'pull_request'
        run: cp packages/pom-vscode/coverage/coverage-summary.json /tmp/pr-coverage-summary-pom-vscode.json

      - name: Restore main branch coverage
        id: restore-main-coverage
        if: github.event_name == 'pull_request'
        uses: actions/cache/restore@v4
        with:
          path: packages/pom-vscode/coverage/coverage-summary.json
          key: coverage-pom-vscode-main-
          restore-keys: coverage-pom-vscode-main-

      - name: Prepare coverage for comparison
        if: github.event_name == 'pull_request' && steps.restore-main-coverage.outputs.cache-matched-key != ''
        run: |
          mkdir -p __main_coverage_pom_vscode
          mv packages/pom-vscode/coverage/coverage-summary.json __main_coverage_pom_vscode/
          cp /tmp/pr-coverage-summary-pom-vscode.json packages/pom-vscode/coverage/coverage-summary.json

      - name: Coverage summary comment (with comparison)
        if: github.event_name == 'pull_request' && steps.restore-main-coverage.outputs.cache-matched-key != ''
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          name: pom-vscode
          json-summary-path: packages/pom-vscode/coverage/coverage-summary.json
          json-summary-compare-path: __main_coverage_pom_vscode/coverage-summary.json

      - name: Coverage summary comment (without comparison)
        if: github.event_name == 'pull_request' && steps.restore-main-coverage.outputs.cache-matched-key == ''
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          name: pom-vscode
          json-summary-path: packages/pom-vscode/coverage/coverage-summary.json

      - name: Build
        working-directory: packages/pom-vscode
        run: pnpm run build
      - name: Integration Test
        working-directory: packages/pom-vscode
        run: xvfb-run -a pnpm run test:integration
      - name: VSIX E2E Test
        continue-on-error: true # TODO: #508 修正後に除去
        working-directory: packages/pom-vscode
        run: xvfb-run -a pnpm run test:vsix
      - name: Clean VSIX artifacts
        if: always()
        working-directory: packages/pom-vscode
        run: pnpm run test:vsix:clean
