name: CI - Build

on:
  push:
    branches: ["main"]
    paths:
      - "src/**"
      - "scripts/**"
      - "vrt/**"
      - "preview/**"
      - "bench/**"
      - "docs/**/*.md"
      - "docs/**/*.mdx"
      - "docs/**/_meta.ts"
      - "*.md"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "tsconfig.check.json"
      - "main.ts"
      - "eslint.config.mts"
      - "knip.json"
      - "vitest.config.ts"
      - ".github/workflows/ci-build.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "src/**"
      - "scripts/**"
      - "vrt/**"
      - "preview/**"
      - "bench/**"
      - "docs/**/*.md"
      - "docs/**/*.mdx"
      - "docs/**/_meta.ts"
      - "*.md"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "tsconfig.check.json"
      - "main.ts"
      - "eslint.config.mts"
      - "knip.json"
      - "vitest.config.ts"
      - ".github/workflows/ci-build.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci
      - run: npm run fmt:check
      - run: npm run lint
      - run: npm run knip
      - run: npm run typecheck
      - run: npm run test:coverage

      - name: Cache main branch coverage
        if: github.event_name == 'push'
        uses: actions/cache/save@v4
        with:
          path: coverage/coverage-summary.json
          key: coverage-main-${{ github.sha }}

      - name: Backup PR coverage
        if: github.event_name == 'pull_request'
        run: cp coverage/coverage-summary.json /tmp/pr-coverage-summary.json

      - name: Restore main branch coverage
        id: restore-main-coverage
        if: github.event_name == 'pull_request'
        uses: actions/cache/restore@v4
        with:
          path: coverage/coverage-summary.json
          key: coverage-main-
          restore-keys: coverage-main-

      - name: Prepare coverage for comparison
        if: github.event_name == 'pull_request' && steps.restore-main-coverage.outputs.cache-matched-key != ''
        run: |
          mkdir -p __main_coverage
          mv coverage/coverage-summary.json __main_coverage/
          cp /tmp/pr-coverage-summary.json coverage/coverage-summary.json

      - name: Coverage summary comment (with comparison)
        if: github.event_name == 'pull_request' && steps.restore-main-coverage.outputs.cache-matched-key != ''
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          json-summary-path: coverage/coverage-summary.json
          json-summary-compare-path: __main_coverage/coverage-summary.json

      - name: Coverage summary comment (without comparison)
        if: github.event_name == 'pull_request' && steps.restore-main-coverage.outputs.cache-matched-key == ''
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          json-summary-path: coverage/coverage-summary.json

      - run: npx tsx main.ts
