name: CI - Docs Images VRT

on:
  push:
    branches: ["main"]
    paths:
      - "docs/**"
      - "src/**"
      - "package.json"
      - "package-lock.json"
      - "docker-compose.yml"
      - ".github/workflows/ci-docs-images-vrt.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "docs/**"
      - "src/**"
      - "package.json"
      - "package-lock.json"
      - "docker-compose.yml"
      - ".github/workflows/ci-docs-images-vrt.yml"

jobs:
  docs-images-vrt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run docs images VRT in Docker
        run: docker compose run --rm docs-images-vrt
      - name: Upload diff on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docs-images-vrt-diff
          path: docs/images/output/diff/
