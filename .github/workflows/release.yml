name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile
      - name: Upgrade npm for trusted publishing (OIDC)
        run: npm install -g npm@^11.5.1
      - run: pnpm run build
      - run: pnpm --filter @hirokisakabe/pom-md run build
      - run: pnpm run test:run
      - run: pnpm --filter @hirokisakabe/pom-md run fmt:check
      - run: pnpm --filter @hirokisakabe/pom-md run lint
      - run: pnpm --filter @hirokisakabe/pom-md run typecheck
      - run: pnpm --filter @hirokisakabe/pom-md run test:run

      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm exec changeset publish
          version: pnpm exec changeset version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

      - name: Sync pnpm-lock.yaml on Release PR branch
        if: steps.changesets.outputs.pullRequestNumber
        run: |
          git fetch origin changeset-release/main
          git checkout changeset-release/main
          pnpm install --lockfile-only
          pnpm exec prettier --write pnpm-lock.yaml
          if ! git diff --quiet -- pnpm-lock.yaml; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add pnpm-lock.yaml
            git commit -m "chore: sync pnpm-lock.yaml"
            git push origin changeset-release/main
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
