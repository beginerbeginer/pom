name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: pnpm --filter @hirokisakabe/pom-md run build
      - run: pnpm run test:run
      - run: pnpm --filter @hirokisakabe/pom-md run fmt:check
      - run: pnpm --filter @hirokisakabe/pom-md run lint
      - run: pnpm --filter @hirokisakabe/pom-md run typecheck
      - run: pnpm --filter @hirokisakabe/pom-md run test:run

      - name: Check for changesets
        id: changesets-check
        run: |
          if find .changeset -maxdepth 1 -name '*.md' ! -name 'README.md' -print -quit 2>/dev/null | grep -q .; then
            echo "has_changesets=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changesets=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Release PR or Publish
        id: changesets
        if: steps.changesets-check.outputs.has_changesets == 'true'
        uses: changesets/action@v1
        with:
          publish: pnpm exec changeset publish
          version: pnpm exec changeset version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

      - name: Sync pnpm-lock.yaml on Release PR branch
        if: steps.changesets.outputs.pullRequestNumber
        run: |
          git fetch origin changeset-release/main
          git checkout changeset-release/main
          pnpm install --lockfile-only
          if ! git diff --quiet -- pnpm-lock.yaml; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add pnpm-lock.yaml
            git commit -m "chore: sync pnpm-lock.yaml"
            git push origin changeset-release/main
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish (after Release PR merge)
        if: steps.changesets-check.outputs.has_changesets == 'false'
        run: pnpm exec changeset publish
        env:
          NPM_CONFIG_PROVENANCE: true
