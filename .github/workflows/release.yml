name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile
      # Workaround: Node 22.22.2 のバンドル npm にモジュール欠損 (promise-retry) があり
      # 直接 npm install -g が失敗するため、npx 経由で正常な npm を取得してインストールする。
      # Node/npm の修正版がリリースされたらこのステップを削除して良い。
      # https://github.com/npm/cli/issues/9151
      # https://github.com/nodejs/node/issues/62425
      - name: Upgrade npm for Trusted Publishing
        run: npx -y npm@11 install -g npm@11
      - run: pnpm --filter @hirokisakabe/pom run build
      - run: pnpm --filter @hirokisakabe/pom-md run build
      - run: pnpm --filter @hirokisakabe/pom run test:run
      - run: pnpm --filter @hirokisakabe/pom-md run fmt:check
      - run: pnpm --filter @hirokisakabe/pom-md run lint
      - run: pnpm --filter @hirokisakabe/pom-md run typecheck
      - run: pnpm --filter @hirokisakabe/pom-md run test:run

      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm exec changeset publish
          version: pnpm exec changeset version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

      # --- pom-vscode: Changesets 統合リリース ---
      - name: Check pom-vscode version change
        id: pom-vscode-check
        if: steps.changesets.outputs.hasChangesets == 'false'
        run: |
          if git diff HEAD~1 --quiet -- packages/pom-vscode/package.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            VERSION=$(node -p "require('./packages/pom-vscode/package.json').version")
            TAG="pom-vscode-v${VERSION}"
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
            echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          fi

      - name: Format check (pom-vscode)
        if: steps.pom-vscode-check.outputs.changed == 'true'
        working-directory: packages/pom-vscode
        run: pnpm run fmt:check

      - name: Lint (pom-vscode)
        if: steps.pom-vscode-check.outputs.changed == 'true'
        working-directory: packages/pom-vscode
        run: pnpm run lint

      - name: Type check (pom-vscode)
        if: steps.pom-vscode-check.outputs.changed == 'true'
        working-directory: packages/pom-vscode
        run: pnpm run typecheck

      - name: Test (pom-vscode)
        if: steps.pom-vscode-check.outputs.changed == 'true'
        working-directory: packages/pom-vscode
        run: pnpm run test:run

      - name: Build (pom-vscode)
        if: steps.pom-vscode-check.outputs.changed == 'true'
        working-directory: packages/pom-vscode
        run: pnpm run build

      - name: Integration Test (pom-vscode)
        if: steps.pom-vscode-check.outputs.changed == 'true'
        working-directory: packages/pom-vscode
        run: xvfb-run -a pnpm run test:integration

      - name: Publish to VS Code Marketplace
        if: steps.pom-vscode-check.outputs.changed == 'true'
        run: |
          npm install -g @vscode/vsce
          PKG_NAME=$(node -p "require('./packages/pom-vscode/package.json').name")
          PUBLISHER=$(node -p "require('./packages/pom-vscode/package.json').publisher")
          EXTENSION_ID="${PUBLISHER}.${PKG_NAME}"
          VERSION="${{ steps.pom-vscode-check.outputs.version }}"
          ALREADY_PUBLISHED=false
          if SHOW_OUTPUT=$(vsce show "${EXTENSION_ID}" --json 2>/dev/null); then
            PUBLISHED_VERSION=$(echo "${SHOW_OUTPUT}" | node -p "try{JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).versions[0].version}catch(e){''}")
            if [ "${PUBLISHED_VERSION}" = "${VERSION}" ]; then
              ALREADY_PUBLISHED=true
            fi
          fi
          if [ "${ALREADY_PUBLISHED}" = "false" ]; then
            cd packages/pom-vscode
            vsce publish
          else
            echo "Version ${VERSION} already published, skipping"
          fi
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Create Git tag (pom-vscode)
        if: steps.pom-vscode-check.outputs.changed == 'true'
        run: |
          TAG="${{ steps.pom-vscode-check.outputs.tag }}"
          if git ls-remote --tags origin "${TAG}" | grep -q "${TAG}"; then
            echo "Tag ${TAG} already exists, skipping"
          else
            git tag "${TAG}"
            git push origin "${TAG}"
          fi

      - name: Create GitHub Release (pom-vscode)
        if: steps.pom-vscode-check.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.pom-vscode-check.outputs.tag }}"
          VERSION="${{ steps.pom-vscode-check.outputs.version }}"
          if gh release view "${TAG}" >/dev/null 2>&1; then
            echo "Release ${TAG} already exists, skipping"
          else
            PREV_TAG=$(git tag -l 'pom-vscode-v*' --sort=-v:refname | grep -v "^${TAG}$" | head -1)
            if [ -n "${PREV_TAG}" ]; then
              gh release create "${TAG}" \
                --title "pom-vscode v${VERSION}" \
                --generate-notes \
                --notes-start-tag "${PREV_TAG}"
            else
              gh release create "${TAG}" \
                --title "pom-vscode v${VERSION}" \
                --generate-notes
            fi
          fi

      - name: Sync pnpm-lock.yaml on Release PR branch
        if: steps.changesets.outputs.pullRequestNumber
        run: |
          git fetch origin changeset-release/main
          git checkout changeset-release/main
          pnpm install --lockfile-only
          pnpm exec prettier --write pnpm-lock.yaml
          if ! git diff --quiet -- pnpm-lock.yaml; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add pnpm-lock.yaml
            git commit -m "chore: sync pnpm-lock.yaml"
            git push origin changeset-release/main
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
