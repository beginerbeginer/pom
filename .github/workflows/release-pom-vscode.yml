name: Release - pom-vscode

on:
  push:
    branches: [main]
    paths:
      - "packages/pom-vscode/**"
      - ".github/workflows/release-pom-vscode.yml"

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build root package
        run: pnpm run build

      - name: Build pom-md
        run: pnpm --filter @hirokisakabe/pom-md run build

      - name: Format check
        working-directory: packages/pom-vscode
        run: pnpm run fmt:check

      - name: Lint
        working-directory: packages/pom-vscode
        run: pnpm run lint

      - name: Type check
        working-directory: packages/pom-vscode
        run: pnpm run typecheck

      - name: Test
        working-directory: packages/pom-vscode
        run: pnpm run test:run

      - name: Build
        working-directory: packages/pom-vscode
        run: pnpm run build

      - name: Integration Test
        working-directory: packages/pom-vscode
        run: xvfb-run -a pnpm run test:integration

      - name: Install vsce
        run: pnpm add -g @vscode/vsce

      - name: Check if version is already published
        id: version-check
        working-directory: packages/pom-vscode
        run: |
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VERSION=$(node -p "require('./package.json').version")
          PUBLISHER=$(node -p "require('./package.json').publisher")
          EXTENSION_ID="${PUBLISHER}.${PKG_NAME}"
          if vsce show "${EXTENSION_ID}" 2>/dev/null | grep -Fq "Version: ${PKG_VERSION}"; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to VS Code Marketplace
        if: steps.version-check.outputs.published == 'false'
        working-directory: packages/pom-vscode
        run: vsce publish
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
