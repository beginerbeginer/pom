name: Release - pom-vscode

on:
  push:
    branches: [main]
    paths:
      - "packages/pom-vscode/**"
      - ".github/workflows/release-pom-vscode.yml"

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.info.outputs.version }}
      tag: ${{ steps.info.outputs.tag }}
      marketplace_published: ${{ steps.marketplace.outputs.published }}
      tag_exists: ${{ steps.tag.outputs.exists }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version info
        id: info
        run: |
          VERSION=$(node -p "require('./packages/pom-vscode/package.json').version")
          TAG="pom-vscode-v${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Check Marketplace
        id: marketplace
        run: |
          npm install -g @vscode/vsce
          PKG_NAME=$(node -p "require('./packages/pom-vscode/package.json').name")
          PUBLISHER=$(node -p "require('./packages/pom-vscode/package.json').publisher")
          EXTENSION_ID="${PUBLISHER}.${PKG_NAME}"
          VERSION="${{ steps.info.outputs.version }}"
          if SHOW_OUTPUT=$(vsce show "${EXTENSION_ID}" --json 2>/dev/null); then
            PUBLISHED_VERSION=$(echo "${SHOW_OUTPUT}" | node -p "try{JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).versions[0].version}catch(e){''}")
            if [ "${PUBLISHED_VERSION}" = "${VERSION}" ]; then
              echo "published=true" >> "$GITHUB_OUTPUT"
            else
              echo "published=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check tag
        id: tag
        run: |
          TAG="${{ steps.info.outputs.tag }}"
          if git ls-remote --tags origin "${TAG}" | grep -q "${TAG}"; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

  release:
    needs: check
    if: needs.check.outputs.marketplace_published == 'false' || needs.check.outputs.tag_exists == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install and build root package
        run: |
          npm ci
          npm run build

      - name: Install and build pom-md
        run: |
          cd packages/pom-md
          npm ci
          npm run build

      - name: Install pom-vscode dependencies
        working-directory: packages/pom-vscode
        run: npm ci

      - name: Format check
        working-directory: packages/pom-vscode
        run: npm run fmt:check

      - name: Lint
        working-directory: packages/pom-vscode
        run: npm run lint

      - name: Type check
        working-directory: packages/pom-vscode
        run: npm run typecheck

      - name: Test
        working-directory: packages/pom-vscode
        run: npm run test:run

      - name: Build
        working-directory: packages/pom-vscode
        run: npm run build

      - name: Integration Test
        working-directory: packages/pom-vscode
        run: xvfb-run -a npm run test:integration

      - name: Publish to VS Code Marketplace
        if: needs.check.outputs.marketplace_published == 'false'
        run: |
          npm install -g @vscode/vsce
          cd packages/pom-vscode
          vsce publish
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Create Git tag
        if: needs.check.outputs.tag_exists == 'false'
        run: |
          TAG="${{ needs.check.outputs.tag }}"
          git tag "${TAG}"
          git push origin "${TAG}"

      - name: Create GitHub Release
        if: needs.check.outputs.tag_exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ needs.check.outputs.tag }}"
          VERSION="${{ needs.check.outputs.version }}"
          PREV_TAG=$(git tag -l 'pom-vscode-v*' --sort=-v:refname | grep -v "^${TAG}$" | head -1)
          if [ -n "${PREV_TAG}" ]; then
            gh release create "${TAG}" \
              --title "pom-vscode v${VERSION}" \
              --generate-notes \
              --notes-start-tag "${PREV_TAG}"
          else
            gh release create "${TAG}" \
              --title "pom-vscode v${VERSION}" \
              --generate-notes
          fi
