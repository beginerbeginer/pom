name: Release - pom-vscode

on:
  push:
    branches: [main]
    paths:
      - "packages/pom-vscode/**"
      - ".github/workflows/release-pom-vscode.yml"

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install and build root package
        run: |
          npm ci
          npm run build

      - name: Install and build pom-md
        run: |
          cd packages/pom-md
          npm ci
          npm run build

      - name: Install pom-vscode dependencies
        working-directory: packages/pom-vscode
        run: npm ci

      - name: Format check
        working-directory: packages/pom-vscode
        run: npm run fmt:check

      - name: Lint
        working-directory: packages/pom-vscode
        run: npm run lint

      - name: Type check
        working-directory: packages/pom-vscode
        run: npm run typecheck

      - name: Test
        working-directory: packages/pom-vscode
        run: npm run test:run

      - name: Build
        working-directory: packages/pom-vscode
        run: npm run build

      - name: Integration Test
        working-directory: packages/pom-vscode
        run: xvfb-run -a npm run test:integration

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Check if version is already published
        id: version-check
        working-directory: packages/pom-vscode
        run: |
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VERSION=$(node -p "require('./package.json').version")
          PUBLISHER=$(node -p "require('./package.json').publisher")
          EXTENSION_ID="${PUBLISHER}.${PKG_NAME}"
          if vsce show "${EXTENSION_ID}" 2>/dev/null | grep -q "^Version:.*${PKG_VERSION}$"; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to VS Code Marketplace
        if: steps.version-check.outputs.published == 'false'
        working-directory: packages/pom-vscode
        run: vsce publish
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
